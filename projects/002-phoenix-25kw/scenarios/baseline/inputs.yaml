project:
  id: "002-phoenix-25kw"
  name: "25 kW PV + 41 kWh ESS Residence"
  location: "Phoenix, AZ"
  ahj: "City of Phoenix"
  nec_edition: "2023"
  # Phase B permit metadata
  client_name: "Desert Sun Residence"
  site_address: "1234 Camelback Rd, Phoenix, AZ 85016"
  coordinates: "33.5079, -112.0476"
  apn: "R-1234-5678-9012"
  utility: "APS"
  drawn_by: "PVE"
  revision: "A"
  initial_design_date: "2026-05-12"

design_engineer:
  firm: "Sunpath Engineering, PLLC"
  address: "500 N Central Ave, Phoenix, AZ 85004"
  contact_email: "design@sunpath-eng.com"
  contact_phone: "(602) 555-0143"
  firm_number: "AZ-PE-29481"

installer:
  company: "Desert Solar Solutions"
  address: "8800 E Bell Rd, Scottsdale, AZ 85260"

pv_array:
  # 60 × 420 W = 25.2 kW total; module datasheet pulled from device library
  modules: 60
  strings: 6
  modules_per_string: 10
  module_ref: "generic_420"
  # ASHRAE 2% mean extreme min for Phoenix, AZ ≈ -2°C (rare frost morning)
  ashrae_2pct_min_c: -2.0
  temp_min_c: -2.0
  temp_max_c: 50.0

battery:
  # 8 × EG4 LifePower4 V2, 51.2 V nominal, 5.12 kWh each → 40.96 kWh total
  brand: "EG4"
  model: "LifePower4 V2"
  quantity: 8
  nominal_voltage: 51.2
  capacity_kwh_each: 5.12

inverter:
  # 3 × generic 8 kW hybrid in parallel; 240 V split-phase, 33 A each
  brand: "Generic"
  model: "8K Hybrid"
  ac_output_v: 240
  ac_output_a: 33
  quantity: 3
  per_unit: false  # batteries and inverters are NOT integrated 1:1

service:
  main_panel_a: 200
  busbar_a: 200
  busbar_source: "nameplate"
  voltage: "120/240 split-phase"
  # 200 + 99 = 299 A backfeed → 120% rule (240) and sum rule (200) both fail;
  # supply-side tap (705.11) is the realistic interconnection path.
  interconnection_methods:
    - "120%_rule"
    - "sum_rule"
    - "supply_side_tap"
  # Two-stage AC panel hierarchy: inverters → Sub Panel #2 → Sub Panel #1 → MSP
  sub_panels:
    - name: "Sub Panel #2"
      rating_a: 200
      busbar_a: 200
      location: "NW exterior wall"
      backfeed_breaker_a: 50    # one 2P-50A per inverter (3 inverters × 50A on Sub #2)
    - name: "Sub Panel #1"
      rating_a: 200
      busbar_a: 200
      location: "Garage (next to MSP)"
      backfeed_breaker_a: 150   # 2P-150A feeder from Sub #2 → Sub #1

loads:
  critical_subpanel_a: 100
  whole_home_backup: true

# Phase D: real wire lengths for NEC 215.2 / 210.19 voltage-drop validation.
wire_lengths:
  pv_string_one_way_ft: 60         # roof to combiner on NW exterior wall
  pv_to_combiner_ft: 15
  combiner_to_inverter_ft: 25      # combiner → garage inverter bay
  inverter_to_ac_disc_ft: 8
  ac_disc_to_msp_ft: 12
  ess_to_inverter_ft: 5

# Phase D: NEC 310.15(B) derating context.
routing:
  ambient_temp_c: 45               # Phoenix attic / roof conduit summer high
  pv_conduit_fill_count: 6         # 6 strings × 2 wires can share a conduit
  ac_conduit_fill_count: 3
