          - [93.0, 52.0]
          - [93.0, 35.0]
          - [96.0, 35.0]
          - [96.0, 54.0]
          - [88.0, 62.0]
          - [72.0, 62.0]
          - [66.0, 69.0]
          - [30.0, 69.0]
    symbols:
      - {kind: "roof_vent", x_ft: 30.0, y_ft: 72.0}
      - {kind: "roof_vent", x_ft: 54.0, y_ft: 69.5}
      - {kind: "roof_vent", x_ft: 64.0, y_ft: 67.5}
      - {kind: "roof_vent", x_ft: 84.0, y_ft: 66.0}
      - {kind: "plumbing", x_ft: 41.0, y_ft: 52.5}
      - {kind: "plumbing", x_ft: 55.0, y_ft: 55.0}
      - {kind: "chimney", x_ft: 44.0, y_ft: 63.5}
  # K.3c: roof_sections injected from Google Solar buildingInsights for
  # 33.141418, -96.801258 (Frisco, Collin Cty TX). Imagery 2024-02-06 HIGH
  # confidence.
  #
  # 2026-05-17 v3 installation strategy update — concentrate on SW quadrant:
  # Sandia annual-kWh derate ranks South (100%) > West (86%) > East (86%).
  # BUT the TX market reality (PV-only + REP buyback variability) makes
  # WEST-facing kWh worth more than EAST-facing kWh of equal annual count:
  #   * West produces 2-6 PM peak (AC running, self-consumed at 1.0× retail)
  #   * East produces AM (no load, exported at 0.5× retail on default REP)
  # → For this installer's TX market: prefer South + West (SW quadrant),
  # skip East faces even though annual derate looks similar.
  # 2026-05-17 v2 (superseded): kept East faces, blended 86.1%
  # 2026-05-17 v3 (current):    drop East, blended ~91% AND $-per-kWh better
  #
  # 13-face → concentrated no-overlap EE-4 layout: 3 South + 1 West.
  # Future K-phase: implement value-weighted derate so the algorithm does
  # this S+W-preference automatically; for now distribution is yaml-pinned.
  # K.11 site_anchor convention:
  #   * azimuth_deg = 0   → eave runs east, ridge to north (South face)
  #   * azimuth_deg = 270 → eave runs south, ridge to east  (West face)
  # Anchors place the roof-local origin (eave-left corner) on the
  # house perimeter; per-face footprint then projects inward.
  # 2026-05-18 Stage 9.6: explicit module_count pins the EE-4/PV-4
  # visual layout after overlap linting. All 36 modules are placed while
  # keeping rectangles clear of adjacent panels and traced fire pathways.
  roof_sections:
    - {name: "South Roof",     roof_type: "Comp Shingle", pitch_deg: 44.3, azimuth_deg: 178.6, width_ft: 25.5, height_ft: 25.5, module_count: 15, shape: "rect", site_anchor_x_ft: 50.0, site_anchor_y_ft: 35.0, site_anchor_azimuth_deg: 0.0}
    - {name: "South Roof #2",  roof_type: "Comp Shingle", pitch_deg: 34.5, azimuth_deg: 179.7, width_ft: 20.3, height_ft: 20.3, module_count: 11, shape: "rect", site_anchor_x_ft: 70.0, site_anchor_y_ft: 35.0, site_anchor_azimuth_deg: 0.0}
    - {name: "West Roof",      roof_type: "Comp Shingle", pitch_deg: 33.0, azimuth_deg: 268.1, width_ft: 19.7, height_ft: 19.7, module_count: 8, shape: "rect", site_anchor_x_ft: 34.0, site_anchor_y_ft: 70.0, site_anchor_azimuth_deg: 270.0}
    - {name: "South Roof #3",  roof_type: "Comp Shingle", pitch_deg: 54.9, azimuth_deg: 182.0, width_ft: 12.3, height_ft: 12.3, module_count: 1, shape: "rect", site_anchor_x_ft: 84.0, site_anchor_y_ft: 30.0, site_anchor_azimuth_deg: 0.0}
    - {name: "South Roof #4",  roof_type: "Comp Shingle", pitch_deg: 36.7, azimuth_deg: 182.0, width_ft: 12.0, height_ft: 16.0, module_count: 1, shape: "rect", site_anchor_x_ft: 86.5, site_anchor_y_ft: 38.5, site_anchor_azimuth_deg: 0.0}
  # K.11 equipment locations — east wall of garage (Oncor meter side),
  # vertically stacked MSP / AC-DISC / Inverter. PV-only (no ESS units).
  equipment_locations:
    msp:           {label: "MSP",           x_ft: 94.0, y_ft: 45.0}
    ac_disconnect: {label: "AC DISCONNECT", x_ft: 94.0, y_ft: 50.0}
    inverters:
      - {label: "INV-1 - GROWATT MIN 11400TL-XH-US", x_ft: 94.0, y_ft: 55.0}
    attic_drop_x_ft: 88.0
    attic_drop_y_ft: 60.0
    attic_to_eq_height_ft: 9.0
  # Dropped faces (off-quadrant — not worth rack cost OR value-weighted bad):
  #   North Roof (50%)   · North Roof #2 (51%) · North Roof #3 (31%)
  #   North Roof #4 (40%) · Northwest Roof (67%, borderline)
  #   East Roof (81%)    · East Roof #2 (77%)  · East Roof #3 (75%)
  #   → East faces dropped for VALUE-weighted reasons even though Sandia
  #   annual derate ≥70%; AM production is mostly exported at 0.5× retail
  #   on default REP plans, while West kWh self-consume the afternoon AC
  #   load at 1.0× retail.
  mounting:
    rail_system: "IronRidge XR100"
    flashing: "IronRidge FlashVue Flashing"
    max_x_spacing_in: 48
    max_y_spacing_in: 32
    max_cantilever_in: 18
    fastener: "(1) 5/16\" x 4-1/4\" lag screw"
    lag_screw_length_in: 4.25
    min_embedment_in: 2.5
    max_roof_surface_gap_in: 6

wire_lengths:
  pv_string_one_way_ft: 70
  pv_to_combiner_ft: 20
  combiner_to_inverter_ft: 25
  inverter_to_ac_disc_ft: 8
  ac_disc_to_msp_ft: 15
  ess_to_inverter_ft: 5

routing:
  ambient_temp_c: 50               # DFW attic summer max
  pv_conduit_fill_count: 8
  ac_conduit_fill_count: 4
