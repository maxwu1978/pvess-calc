    lot_outline:
      - [-7.0, 28.0]
      - [106.0, 28.0]
      - [106.0, 94.0]
      - [-7.0, 94.0]
    driveway_polygon:
      - [91.0, 28.0]
      - [106.0, 28.0]
      - [106.0, 94.0]
      - [91.0, 94.0]
    fence_lines:
      - label: "FENCE"
        kind: "fence"
        points:
          - [91.0, 94.0]
          - [106.0, 94.0]
    property_dimensions:
      - start: [-7.0, 94.0]
        end: [106.0, 94.0]
        offset_ft: 8.0
      - start: [106.0, 28.0]
        end: [106.0, 94.0]
        offset_ft: -3.0
  # Stage 8: review-only satellite/mask calibration for EE-4.
  # The Google Solar mask is not written back into roof geometry yet;
  # it is fitted to the current house bbox so the green candidate line
  # can be visually compared against modules/fire paths in the preview.
