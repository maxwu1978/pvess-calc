  lot_depth_ft: 125
  house_width_ft: 60
  house_depth_ft: 42
  # Stage 9.9: EE-4A property context is now data-driven. These survey-frame
  # polygons live in the same local ft coordinates as `ee4_trace`, so the
  # property line, driveway, fence, and dimension strings are no longer
  # inferred from a generic rectangle.
