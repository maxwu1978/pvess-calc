        - [96.0, 35.0]
        - [96.0, 42.0]
        - [98.0, 47.0]
        - [98.0, 58.0]
        - [94.0, 64.0]
        - [88.0, 64.0]
        - [88.0, 75.0]
        - [76.0, 75.0]
        - [76.0, 83.0]
        - [60.0, 83.0]
        - [50.0, 75.0]
        - [38.0, 75.0]
        - [27.0, 83.0]
        - [0.0, 83.0]
    roof_facets:
      - name: "Left dormer 1"
        vertices: [[6.0, 63.0], [18.0, 63.0], [25.0, 68.0], [18.0, 73.0], [6.0, 73.0]]
      - name: "Left dormer 2"
        vertices: [[6.0, 51.0], [18.0, 51.0], [25.0, 56.0], [18.0, 61.0], [6.0, 61.0]]
      - name: "Left dormer 3"
        vertices: [[6.0, 39.0], [18.0, 39.0], [25.0, 44.0], [18.0, 49.0], [6.0, 49.0]]
    roof_lines:
      - {kind: "hip", points: [[27.0, 83.0], [38.0, 75.0], [38.0, 48.0], [15.0, 35.0]]}
      - {kind: "hip", points: [[38.0, 75.0], [50.0, 75.0], [60.0, 83.0]]}
      - {kind: "hip", points: [[76.0, 83.0], [76.0, 75.0], [88.0, 75.0]]}
      - {kind: "valley", points: [[88.0, 75.0], [88.0, 64.0], [98.0, 58.0]]}
      - {kind: "ridge", points: [[38.0, 48.0], [52.0, 54.0], [66.0, 54.0], [76.0, 64.0]]}
      - {kind: "hip", points: [[15.0, 48.0], [38.0, 48.0]]}
      - {kind: "hip", points: [[76.0, 64.0], [88.0, 64.0]]}
