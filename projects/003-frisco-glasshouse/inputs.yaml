# 2026-05-17 v2 sales config: 14.9 kW PV-only on Green Mountain 1:1 buyback REP.
# 36 modules × 415 W = 14.94 kW DC. Schema enforces balanced strings:
#   4 strings × 9 modules = 36
# NEC 690.7(A) cold-Voc:
#   Voc_cold = 49.8 × (1 + 0.0027 × (25 - (-7))) = 54.1 V / module
#   9 × 54.1 = 487 V < 600 V residential limit ✓ (190 V margin)
# DC/AC ratio: 14.94 kW / 11.4 kW = 1.31 (Growatt MIN 11400TL-XH-US)
# Skipped 5 north-facing roof faces (derate 30-49%) — see site.roof_sections.
pv_array:
  modules: 36
  strings: 4
  modules_per_string: 9
  module:
    brand: "Talesun"
    model: "TP7G54M 415"
    power_w: 415
    voc_stc: 49.8
    isc_stc: 10.65
    voc_temp_coeff_pct_per_c: -0.27
    isc_temp_coeff_pct_per_c: 0.040
  ashrae_2pct_min_c: -7.0
  temp_min_c: -7.0
  temp_max_c: 38.0

# PV-only — no battery (TX market default: backup is a separate decision from
# energy economics; Smart Meter Texas + GME 1:1 REP plan delivers full ROI
# without storage). All battery fields kept for schema validity but
# quantity=0 zeros out the ESS branch end-to-end (backup hours, install
# checks, ESS OCPD, GES bonding — all degrade gracefully).
#
# To add backup: bump quantity to 1 (16 kWh in-house ≈ +$4,200 post-ITC ≈
# +$35/mo over 10 yr → 9.5 yr payback vs 8.2 yr PV-only).
battery:
  brand: "—"
  model: "(no battery — grid-tied PV-only)"
  quantity: 0
  nominal_voltage: 400.0
  capacity_kwh_each: 0.0
  install_location: "unknown"

# Single Growatt MIN 11400TL-XH-US battery-ready inverter. DC/AC ratio
# 14.94/11.4 = 1.31 (industry sweet-spot). Datasheet max output current
# is 48 A @ 240 V split-phase.
inverter:
  brand: "Growatt"
  model: "MIN 11400TL-XH-US"
  ac_output_v: 240
  ac_output_a: 48.0
  quantity: 1
  per_unit: false

optimizer:
  ref: "tigo_ts4_a_o"

service:
  main_panel_a: 200
  busbar_a: 200
  busbar_source: "nameplate"
  voltage: "120/240 split-phase"
  interconnection_methods:
    - "120%_rule"
    - "supply_side_tap"
  # K.2.5: MSP slot accounting (Frisco subdivision typical 30 slots,
  # ~26 used by existing breakers).
  msp_available_slots: 30
  msp_used_slots: 26
  existing_solar_breaker_a_msp: 0
  sub_panels:
    - name: "Critical Loads Sub"
      role: "critical_loads"
      rating_a: 125
      busbar_a: 125
      location: "Garage (downstream of PW3 backup gateway)"
      backfeed_breaker_a: 100
      available_slots: 24
      used_slots: 12
      service_rated: false
      enclosure_rating: "NEMA 1"
      distance_to_msp_ft: 12.0
  # K.5: GES — typical Frisco 2003-build, 2 rods + Ufer.
  grounding_electrode_system:
    rods:
      - length_ft: 8
        diameter_in: 0.625
        material: "copper_clad_steel"
        location: "SE corner near MSP"
      - length_ft: 8
        location: "6 ft NW of rod #1"
    ufer:
      length_ft: 20
      conductor: "rebar"
      conductor_size: "1/2 in rebar"
      location: "south foundation"
    gec_main_size_awg: "4"
    bonded_to_neutral_at_service: "yes"

loads:
  critical_subpanel_a: 100
  whole_home_backup: false
  # Smart Meter Texas 12-month export (placeholder pattern; real data
  # would come from the homeowner's CSV download).
  monthly_kwh: [1100, 1000, 950, 1050, 1400, 1850,
                2100, 2150, 1900, 1300, 1000, 1050]
  hvac_type: "heat_pump"
  has_ev: false
  planned_ev: true
  planned_electrification: false
  # 2026-05-17 v4 (K.4.6.6 SMT semantics): customer is on Green Mountain
  # Renewable Rewards — TRUE 1:1 buyback. With Smart Meter Texas net
  # metering, every kWh produced offsets the bill, regardless of timing
  # (daytime export = nighttime credit). The `self_consumption_fraction`
  # field is mathematically irrelevant on 1:1 plans (effective_rate
  # collapses to retail × 1.0). Set to 0.30 here just to document the
  # passive baseline — it's NOT what the savings number actually uses.
  #
  # IMPORTANT for the sales conversation: if this homeowner ever
  # switches to a default Oncor-area REP (~0.5× buyback), payback
  # nearly doubles. doctor check `tx_rep_plan_explicitly_chosen` will
  # flag any TX project still on generic `1to1_nem`. To model a
  # plan not in our preset list, use `rep_buyback_ratio: 0.85` +
  # `rep_plan_name: "Custom REP"`.
  export_tariff_model: "tx_green_mountain"
  self_consumption_fraction: 0.30
  rep_plan_name: "Green Mountain Renewable Rewards (1:1 retail, SMT NEM)"

  # K.4.6.5 — 3-tier quote table. Renders in the customer PDF
  # alongside the base PV-only config. All three tiers share the
  # 15 kW array (same monthly savings); the upgrade is a backup
  # decision (none → 14h critical → 24h whole-home), not a savings
  # decision. Sales narrative: "battery is backup cost, not savings."
  backup_options:
    - name: "+ 16 kWh in-house battery"
      battery_ref: "inhouse_16kwh_hv"
      quantity: 1
    - name: "+ 20 kWh Growatt HV stack"
      battery_ref: "growatt_apx_20kwh"
      quantity: 1

  # K.8.2: opt-in value-weighted module distribution. On the GME 1:1
  # plan this flag is mathematically a no-op (value derate collapses
  # to Sandia annual derate → same distribution as K.8.1 area-only).
  # BUT setting it documents the design intent + future-proofs the
  # project: if the homeowner ever switches to a sub-1:1 REP, the
  # algorithm auto-shifts modules from East-facing faces to West/SW
  # without yaml manual face-pruning.
  use_value_weighted_distribution: true

site:
  urban_density: "suburban"
  roof_pitch_deg: 35
  array_azimuth_deg: 180
  # K.11 site geometry — Frisco TX typical residential lot.
  # Lot 90×125 ft; house centered with 35 ft front setback, 48 ft rear,
  # 15 ft side. Origin = lot front-left corner, +x = east, +y = north
  # (away from street, toward back of property).
