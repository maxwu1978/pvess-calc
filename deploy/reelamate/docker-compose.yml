services:
  pvess-web:
    build:
      context: ../..
    restart: unless-stopped
    environment:
      PORT: "8765"
      PVESS_WEB_WORKDIR: /data/pvess-web
      PVESS_WEB_ACCESS_TOKEN: ${PVESS_WEB_ACCESS_TOKEN:?set PVESS_WEB_ACCESS_TOKEN}
      PVESS_WEB_CORS_ORIGINS: https://pvess.reelamate.com
      PVESS_MAPBOX_TOKEN: ${PVESS_MAPBOX_TOKEN:-}
      PVESS_NREL_API_KEY: ${PVESS_NREL_API_KEY:-}
      PVESS_GOOGLE_SOLAR_KEY: ${PVESS_GOOGLE_SOLAR_KEY:-}
    volumes:
      - pvess-web-data:/data/pvess-web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - pvess-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pvess-web-data:
  caddy-data:
  caddy-config:
